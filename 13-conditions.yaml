- name: print the number greater than 10 
  hosts: local
  connection: local
  vars_prompt: 
    - name: my_number
      prompt: "please enter number:"
  tasks:
      - name: Convert user prompt string to integer
        ansible.builtin.set_fact:
          user_integer: "{{ my_number | int }}"

      - name: Print if number is greater than 10
        ansible.builtin.debug:
          msg: "Number is greater than 10"
        when: user_integer > 10
  
