- name: print the number greater than 10 
  hosts: local
  connection: local
  vars_prompt: 
    - name: my_number
      prompt: "please enter number:"
  tasks:
    - name: Convert user prompt string to integer
      ansible.builtin.set_fact:
        user_integer: "{{ my_number | int }}"
      register: user_integer
    # - name: print if number is greater than 10 
    #   ansible.builtin.debug:
    #     msg: "Given number {{ my_number }} is greater than 10"
    #   when: user_integer > 10 
    # - name: print if number less than or eqaul to 10 
    #   ansible.builtin.debug:
    #     msg: "Given number {{ my_number }} is less than or eqaul to 10"
    #   when: user_integer <= 10 

    - name: print register output
      ansible.builtin.debug:
        msg: "{{ user_integer }}"

